<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Loan Eligibility Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }
        .container {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px #aaa;
        }
        h2 {
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Loan Eligibility Predictor</h2>

    <input type="number" id="age" placeholder="Age">
    <input type="number" id="income" placeholder="Monthly Income">
    <input type="number" id="emi" placeholder="Existing EMI">
    <input type="number" id="credit" placeholder="Credit Score">
    <input type="number" id="amount" placeholder="Loan Amount">

    <button onclick="checkEligibility()">Check Eligibility</button>

    <div class="result" id="result"></div>
</div>

<script>
function checkEligibility() {
    let age = document.getElementById("age").value;
    let income = document.getElementById("income").value;
    let emi = document.getElementById("emi").value;
    let credit = document.getElementById("credit").value;
    let amount = document.getElementById("amount").value;

    if(age >= 21 && income >= 15000 && credit >= 650 && emi < (income * 0.4)) {
        document.getElementById("result").innerHTML =
        "✅ Eligible for Loan";
        document.getElementById("result").style.color = "green";
    } else {
        document.getElementById("result").innerHTML =
        "❌ Not Eligible for Loan";
        document.getElementById("result").style.color = "red";
    }
}
</script>

</body>
</html>
